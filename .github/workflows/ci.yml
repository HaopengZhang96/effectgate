name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  node:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: python3 -m py_compile python/effectgate/__init__.py
      - run: swiftc desktop/macos/EffectGateMenuBar.swift -o /tmp/EffectGateMenuBar -framework Cocoa -framework Foundation
      - run: npm pack --dry-run
